<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paid Tournament – PHOENIX X</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    .prize-badge {
      background: rgba(255, 215, 0, 0.12);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 8px;
      padding: 8px 14px;
      text-align: center;
    }

    .prize-badge .pos {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .prize-badge .amt {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--gold);
      font-weight: 700;
    }
    
    .card-countdown {
      font-size: 11px;
      color: var(--orange);
      font-weight: 700;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <div class="page-title">PAID TOURNAMENT</div>
          <div class="live-badge">
            <div class="live-dot"></div> LIVE
          </div>
        </div>
        <div class="topbar-right">
          <div
            style="background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);padding:4px 14px;border-radius:20px;font-family:var(--font-display);font-size:12px;color:var(--gold)">
            <i class="fa-solid fa-coins"></i> <span id="header-balance">0</span> Coins
          </div>
          <div class="topbar-avatar" id="tb-avatar" onclick="window.location='/pages/account.html'"
            style="cursor:pointer">P</div>
        </div>
      </div>
      <div class="page-content">
        <!-- KYC Warning -->
        <div id="kyc-warn"
          style="display:none;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px">
          <div style="font-weight:600;color:var(--error)"><i class="fa-solid fa-triangle-exclamation"></i> KYC Required
            for Paid Tournaments</div>
          <div style="font-size:12px;color:var(--text-secondary);margin-top:4px">Complete KYC verification to join. <a
              href="/pages/account.html" style="color:#5bc0eb">Verify Now →</a></div>
        </div>

        <!-- Tabs & Filters -->
        <div class="flex-between mb-24" style="align-items:center; flex-wrap:wrap; gap:16px;">
          <div class="tabs" style="margin-bottom: 0;">
            <button class="tab-btn active" onclick="switchTab('live', this)"><i class="fa-solid fa-circle"
                style="color:var(--error);"></i> Live</button>
            <button class="tab-btn" onclick="switchTab('upcoming', this)"><i class="fa-solid fa-clock"></i>
              Upcoming</button>
          </div>

          <!-- Filters -->
          <div class="flex" style="gap:12px; flex-wrap:wrap;">
            <select id="filter-min" class="input"
              style="padding:8px 12px; width:auto; border-radius:8px; cursor:pointer;" onchange="renderTournaments()">
              <option value="all">Timer (All)</option>
              <option value="1">1 Min</option>
              <option value="3">3 Min</option>
              <option value="5">5 Min</option>
            </select>
            <select id="filter-entry" class="input"
              style="padding:8px 12px; width:auto; border-radius:8px; cursor:pointer;" onchange="renderTournaments()">
              <option value="all">Entry (All)</option>
              <option value="5">5 Coins</option>
              <option value="10">10 Coins</option>
              <option value="15">15 Coins</option>
              <option value="20">20 Coins</option>
              <option value="30">30 Coins</option>
              <option value="50">50 Coins</option>
              <option value="80">80 Coins</option>
              <option value="100">100 Coins</option>
              <option value="200">200 Coins</option>
              <option value="300">300 Coins</option>
              <option value="500">500 Coins</option>
            </select>
          </div>
        </div>

        <!-- Tournament Display Area -->
        <div id="tournament-display">
          <div class="grid-auto">
            <div class="skeleton" style="height:220px;border-radius:var(--radius)"></div>
            <div class="skeleton" style="height:220px;border-radius:var(--radius)"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ENTRY MODAL -->
  <div class="modal-overlay" id="entry-modal">
    <div class="modal" style="max-width:500px;width:95%">
      <div class="flex-between mb-8">
        <div class="modal-title" id="entry-t-name">Tournament</div>
        <button onclick="document.getElementById('entry-modal').classList.remove('active')"
          style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer"><i
            class="fa-solid fa-xmark"></i></button>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:20px" id="entry-t-meta">...</div>

      <!-- Prize Pool -->
      <div
        style="background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.2);border-radius:12px;padding:16px;margin-bottom:20px">
        <div
          style="text-align:center;margin-bottom:12px;font-family:var(--font-display);font-size:11px;color:var(--text-muted);letter-spacing:1px">
          PRIZE POOL</div>
        <div
          style="text-align:center;font-family:var(--font-display);font-size:32px;font-weight:900;color:var(--gold);margin-bottom:12px"
          id="entry-pool">0 Coins</div>
        <div style="display:flex;gap:10px;justify-content:center">
          <div class="prize-badge">
            <div class="pos">1ST</div>
            <div class="amt" id="prize-1st">0</div>
          </div>
          <div class="prize-badge">
            <div class="pos">2ND</div>
            <div class="amt" id="prize-2nd">0</div>
          </div>
          <div class="prize-badge">
            <div class="pos">3RD</div>
            <div class="amt" id="prize-3rd">0</div>
          </div>
        </div>
      </div>

      <div
        style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:20px">
        <div class="flex-between" style="margin-bottom:8px">
          <span style="font-size:13px;color:var(--text-secondary)">Entry Fee</span>
          <span style="font-family:var(--font-display);font-size:16px;color:var(--orange)" id="entry-fee-label">0
            Coins</span>
        </div>
        <div class="flex-between">
          <span style="font-size:13px;color:var(--text-secondary)">Your Balance</span>
          <span style="font-family:var(--font-display);font-size:16px;color:#5bc0eb" id="entry-balance-label">0
            Coins</span>
        </div>
        <div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px" class="flex-between">
          <span style="font-size:13px;font-weight:600">Balance After</span>
          <span style="font-family:var(--font-display);font-size:16px;font-weight:700" id="entry-after-label">0
            Coins</span>
        </div>
      </div>

      <div id="entry-error" class="error-msg" style="margin-bottom:12px;text-align:center"></div>
      <div class="modal-actions" style="justify-content:center">
        <button class="btn btn-secondary"
          onclick="document.getElementById('entry-modal').classList.remove('active')">Cancel</button>
        <button class="btn btn-primary btn-lg" id="confirm-join-btn" onclick="confirmJoin()"><i
            class="fa-solid fa-coins"></i> Confirm Entry</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error();
    const user = getUser();
    loadSidebar();
    if (user.profile_image) {
      document.getElementById('tb-avatar').innerHTML = `<img src="${user.profile_image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    } else {
      document.getElementById('tb-avatar').textContent = (user.username || 'P').replace('@', '')[0].toUpperCase();
    }

    if (user.kyc_status !== 'verified') document.getElementById('kyc-warn').style.display = 'block';

    let currentTab = 'live';
    let selectedTournament = null;
    let userBalance = 0;

    async function loadBalance() {
      const res = await WalletAPI.getBalance();
      if (res?.success) { userBalance = res.wallet.balance; document.getElementById('header-balance').textContent = userBalance.toLocaleString(); }
    }

    let allTournaments = [];

    async function loadTournaments() {
      const res = await TournamentAPI.getAll('paid', currentTab === 'live' ? 'live,starting,full' : 'upcoming');
      if (res?.success) {
        allTournaments = res.tournaments || [];
      } else {
        allTournaments = [];
      }
      renderTournaments();
    }

    function createCardHTML(t) {
      const pct = Math.round((t.current_players / t.max_players) * 100);
      const isJoined = t.players?.some(p => (p.user_id?.id || p.user_id) === user.id);
      const canAfford = userBalance >= t.entry_fee;
      const formatName = `16 Player Knockout`;
      const displayId = t.display_id || `TR-${t.id.slice(0,4)}`;
      
      let countdownHTML = '';
      if (t.status === 'full' || t.status === 'live') {
        const diff = Math.max(0, Math.floor((new Date(t.start_time) - Date.now()) / 1000));
        const prefix = t.status === 'full' ? 'Going LIVE in: ' : 'Matchmaking in: ';
        countdownHTML = `<div class="card-countdown" data-time="${t.start_time}" data-status="${t.status}">${prefix}${fmt.countdown(diff)}</div>`;
      }

      return `<div class="tournament-card" onclick="openEntry('${t.id}')">
        <div class="flex-between mb-12">
          <div style="display:flex;gap:6px">
            <span class="timer-badge">${t.timer_type}min</span>
            <span style="background:rgba(255,255,255,0.05);padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;color:var(--text-muted)">${displayId}</span>
          </div>
          <span class="badge ${t.status === 'live' ? 'badge-live' : (t.status === 'full' ? 'badge-pending' : 'badge-upcoming')}">
            ${t.status === 'live' ? '<i class="fa-solid fa-circle" style="color:var(--error);"></i> LIVE' : 
              (t.status === 'full' ? '<i class="fa-solid fa-users"></i> FULL' : '<i class="fa-solid fa-clock"></i> SOON')}
          </span>
        </div>
        ${countdownHTML}
        <div style="font-weight:700;font-size:15px;margin-bottom:2px">${t.name}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px"><i class="fa-solid fa-trophy"></i> ${formatName}</div>
        <div style="font-family:var(--font-display);font-size:24px;font-weight:900;color:var(--gold);margin-bottom:4px">${t.prize_pool?.toLocaleString() || 0} <span style="font-size:12px;color:var(--text-secondary)">Coins</span></div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">Prize Pool (Top 3)</div>
        <div class="flex-between" style="font-size:12px;color:var(--text-secondary);margin-bottom:6px">
          <span>${t.current_players}/${t.max_players} players</span>
          <span style="color:var(--orange)">Entry: ${t.entry_fee} <i class="fa-solid fa-coins"></i></span>
        </div>
        <div class="players-bar"><div class="players-fill" style="width:${pct}%"></div></div>
        <div style="margin-top:12px">
          ${isJoined ? (t.status === 'live' || t.status === 'full' || t.status === 'starting' || t.status === 'playing' ? '<button class="btn btn-primary btn-full btn-sm" onclick="event.stopPropagation(); window.location.href=\'/pages/tournament-live.html?id='+t.id+'\'">▶ Enter Arena</button>' : '<span class="badge badge-verified" style="width:100%;justify-content:center"><i class="fa-solid fa-check"></i> Joined</span>') :
            (t.status === 'live' || t.status === 'full' || t.status === 'starting' || t.status === 'playing') ? '<span class="badge badge-rejected" style="width:100%;justify-content:center">Entry Closed</span>' :
            !canAfford ? '<span style="font-size:11px;color:var(--error);display:block;text-align:center"><i class="fa-solid fa-triangle-exclamation"></i> Insufficient coins</span>' :
            '<button class="btn btn-primary btn-full btn-sm">Join Tournament</button>'}
        </div>
      </div>`;
    }

    function renderTournaments() {
      const displayArea = document.getElementById('tournament-display');

      if (!allTournaments.length) {
        displayArea.innerHTML = `<div style="text-align:center;padding:48px;color:var(--text-muted)">
      <div style="font-size:40px;margin-bottom:12px"><i class="fa-solid fa-trophy"></i></div>
      <div style="font-weight:600">No ${currentTab} paid tournaments</div>
      <div style="font-size:12px;margin-top:6px">Check back soon or ask admin to create one</div>
    </div>`;
        return;
      }

      const filterMin = document.getElementById('filter-min').value;
      const filterEntry = document.getElementById('filter-entry').value;

      let filteredList = allTournaments.filter(t => {
        let matchesMin = filterMin === 'all' || t.timer_type === parseInt(filterMin);
        let matchesEntry = filterEntry === 'all' || t.entry_fee === parseInt(filterEntry);
        return matchesMin && matchesEntry;
      });

      const grouped = { 1: [], 3: [], 5: [], 10: [] };
      filteredList.forEach(t => { if (grouped[t.timer_type]) grouped[t.timer_type].push(t); });

      let html = '';
      const isDefaultView = filterMin === 'all' && filterEntry === 'all';
      let hasResults = false;

      for (const timer of [1, 3, 5, 10]) {
        let list = grouped[timer];
        if (!list.length) continue;

        hasResults = true;
        if (isDefaultView) {
          list = list.slice(0, 4); 
        }

        html += `<div style="margin-bottom:32px;">
       <h3 style="margin-bottom:16px; display:flex; align-items:center; gap:8px;">
         <span style="background:var(--primary); color:white; padding:4px 10px; border-radius:6px; font-size:14px;">${timer} Min</span>
         <span style="font-size:14px; font-weight:400; color:var(--text-muted);">Tournaments</span>
       </h3>
       <div class="grid-auto">
         ${list.map(t => createCardHTML(t)).join('')}
       </div>
     </div>`;
      }

      if (!hasResults) {
        displayArea.innerHTML = `<div style="text-align:center;padding:48px;color:var(--text-muted)">
          <div style="font-size:40px;margin-bottom:12px"><i class="fa-solid fa-filter"></i></div>
          <div style="font-weight:600">No matching tournaments found</div>
          <div style="font-size:12px;margin-top:6px">Try changing your filters</div>
        </div>`;
      } else {
        displayArea.innerHTML = html;
      }
    }

    async function openEntry(id) {
      selectedTournament = id;
      const res = await TournamentAPI.getById(id);
      if (!res?.success) return;
      const t = res.tournament;
      document.getElementById('entry-t-name').textContent = t.name;
      document.getElementById('entry-t-meta').textContent = `${t.timer_type}min · ${t.current_players}/${t.max_players} players`;
      document.getElementById('entry-pool').textContent = (t.prize_pool || 0).toLocaleString() + ' Coins';
      document.getElementById('prize-1st').innerHTML = (t.prize_first || 0) + ' <i class="fa-solid fa-coins"></i>';
      document.getElementById('prize-2nd').innerHTML = (t.prize_second || 0) + ' <i class="fa-solid fa-coins"></i>';
      document.getElementById('prize-3rd').innerHTML = (t.prize_third || 0) + ' <i class="fa-solid fa-coins"></i>';
      document.getElementById('entry-fee-label').textContent = t.entry_fee + ' Coins';
      document.getElementById('entry-balance-label').textContent = userBalance + ' Coins';
      const after = userBalance - t.entry_fee;
      document.getElementById('entry-after-label').textContent = after + ' Coins';
      document.getElementById('entry-after-label').style.color = after < 0 ? 'var(--error)' : 'var(--success)';

      const errEl = document.getElementById('entry-error');
      const btn = document.getElementById('confirm-join-btn');
      const isJoined = t.players?.some(p => (p.user_id?.id || p.user_id) === user.id);

      if (isJoined && (t.status === 'live' || t.status === 'full' || t.status === 'starting' || t.status === 'playing')) {
        btn.textContent = '▶ Enter Arena';
        btn.disabled = false;
        btn.onclick = () => window.location.href = '/pages/tournament-live.html?id=' + t.id;
        errEl.textContent = '';
      }
      else if (isJoined) { errEl.innerHTML = '<i class="fa-solid fa-check"></i> Already joined!'; btn.disabled = true; }
      else if (t.status !== 'upcoming') { errEl.textContent = 'Join period closed.'; btn.disabled = true; }
      else if (userBalance < t.entry_fee) { errEl.textContent = `Insufficient coins. Need ${t.entry_fee - userBalance} more.`; btn.disabled = true; }
      else if (user.kyc_status !== 'verified') { errEl.textContent = 'KYC verification required.'; btn.disabled = true; }
      else {
        errEl.textContent = '';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-coins"></i> Confirm Entry';
        btn.onclick = () => confirmJoin();
      }

      document.getElementById('entry-modal').classList.add('active');
    }

    async function confirmJoin() {
      if (!selectedTournament) return;
      const btn = document.getElementById('confirm-join-btn');
      btn.disabled = true; btn.textContent = 'Joining...';
      const res = await TournamentAPI.join(selectedTournament);
      if (res?.success) {
        Toast.success('Joined! Entry coins deducted. Good luck! <i class="fa-solid fa-trophy"></i>');

        if (currentTab === 'live') {
          window.location.href = '/pages/tournament-live.html?id=' + selectedTournament;
        } else {
          document.getElementById('entry-modal').classList.remove('active');
          loadBalance(); loadTournaments();
        }
      } else {
        Toast.error(res?.message || 'Failed to join.');
        btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-coins"></i> Confirm Entry';
      }
    }

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadTournaments();
    }

    setInterval(() => {
      document.querySelectorAll('.card-countdown').forEach(el => {
        const startTime = new Date(el.dataset.time);
        const status = el.dataset.status;
        const diff = Math.max(0, Math.floor((startTime - Date.now()) / 1000));
        const prefix = status === 'full' ? 'Going LIVE in: ' : 'Matchmaking in: ';
        el.textContent = `${prefix}${fmt.countdown(diff)}`;
        if (diff === 0) loadTournaments(); 
      });
    }, 1000);

    loadBalance();
    loadTournaments();
    setInterval(loadTournaments, 30000);
  </script>
</body>

</html>
