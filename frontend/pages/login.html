<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHOENIX X – Login</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .auth-wrap {
      display: flex;
      width: 100%;
      max-width: 960px;
      min-height: 560px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    .auth-left {
      flex: 1;
      background: linear-gradient(135deg, #0a1628, #061520);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }

    .auth-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(91, 192, 235, 0.12), transparent 70%);
    }

    .chess-float {
      font-size: 80px;
      animation: float 3s ease-in-out infinite;
      position: relative;
      z-index: 1;
      margin-bottom: 24px;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-12px)
      }
    }

    .auth-brand {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 900;
      color: #5bc0eb;
      letter-spacing: 4px;
      position: relative;
      z-index: 1;
    }

    .auth-brand span {
      color: var(--orange);
    }

    .auth-tagline {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 8px;
      position: relative;
      z-index: 1;
    }

    .auth-features {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 260px;
    }

    .feat {
      display: flex;
      align-items: center;
      gap: 10px;
      background:#ffffff71;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 13px;
      
    
    }

    .auth-right {
      flex: 1;
      background: var(--bg-secondary);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .auth-sub {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      background: none;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: #5bc0eb;
      color: #000;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    @media (max-width:640px) {
      .auth-left {
        display: none
      }


      .auth-right {
        padding: 32px 24px
      }

      .auth-wrap {
        border-radius: 16px;
        max-width: 400px
      }
    }
  </style>
</head>

<body>
  <div class="auth-wrap">
    <!-- LEFT PANEL -->
    <div class="auth-left">
      <div class="chess-float"><i class="fa-solid fa-chess-king"></i></div>
      <div class="auth-brand">PHOENIX<span>X</span></div>
      <div class="auth-tagline">The Ultimate Chess Platform</div>
      <div class="auth-features">
        <div class="feat"><i class="fa-solid fa-chess-pawn"></i> Real-time multiplayer chess</div>
        <div class="feat"><i class="fa-solid fa-trophy"></i> Free & Paid Tournaments</div>
        <div class="feat"><i class="fa-solid fa-coins"></i> Earn real coin rewards</div>
        <div class="feat"><i class="fa-solid fa-chart-bar"></i> IQ-based ranking system</div>
        <div class="feat"><i class="fa-solid fa-dumbbell"></i> Powered by PHOENIX BROTHERS</div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
      <div class="auth-title">Welcome Back <i class="fa-solid fa-chess-king"></i></div>
      <div class="auth-sub">Sign in to continue your chess journey</div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login',this)">Login</button>
        <button class="auth-tab" onclick="switchTab('register',this)">Register</button>
      </div>

      <!-- LOGIN -->
      <form class="auth-form active" id="login-form" onsubmit="doLogin(event)">
        <div class="input-group">
          <label class="input-label">Email Address</label>
          <input type="email" id="l-email" class="input" placeholder="player@email.com" required>
        </div>
        <div class="input-group">
          <label class="input-label">Password</label>
          <input type="password" id="l-pass" class="input" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">Login</button>
        <div id="login-err" class="error-msg" style="margin-top:12px;text-align:center"></div>
      </form>

      <!-- REGISTER -->
      <form class="auth-form" id="register-form" onsubmit="doRegister(event)">
        <div class="grid-2" style="gap:12px">
          <div class="input-group" style="margin-bottom:0">
            <label class="input-label">Username</label>
            <input type="text" id="r-user" class="input" placeholder="@chess_king" required minlength="5"
              oninput="this.value = this.value.toLowerCase().replace(/[^a-z0-9@_]/g, '')">
          </div>
          <div class="input-group" style="margin-bottom:0">
            <label class="input-label">Full Name</label>
            <input type="text" id="r-name" class="input" placeholder="Your Name">
          </div>
        </div>
        <div class="input-group" style="margin-top:12px">
          <label class="input-label">Email Address</label>
          <input type="email" id="r-email" class="input" placeholder="player@email.com" required>
        </div>
        <div class="input-group">
          <label class="input-label">Password <span style="color:var(--text-muted);font-size:11px">(min 6 chars)</span></label>
          <input type="password" id="r-pass" class="input" placeholder="Minimum 6 characters" required minlength="6">
        </div>
        <div class="input-group">
          <label class="input-label">Phone <span style="color:var(--text-muted);font-size:11px">(optional)</span></label>
          <input type="tel" id="r-phone" class="input" placeholder="+91 9876543210">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn" style="margin-top:8px">Create Account</button>
        <div id="register-err" class="error-msg" style="margin-top:12px;text-align:center"></div>
      </form>

      <!-- OAuth Logins -->
      <div style="margin-top:24px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
          <div style="flex:1;height:1px;background:var(--border)"></div>
          <span style="font-size:12px;color:var(--text-muted)">OR</span>
          <div style="flex:1;height:1px;background:var(--border)"></div>
        </div>
        <button type="button" class="btn btn-secondary btn-full btn-lg" id="google-btn" onclick="doGoogleLogin()">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
            <path fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
            <path fill="#FBBC05"
              d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.08 24.08 0 0 0 0 21.56l7.98-6.19z" />
            <path fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          </svg>
          Sign in with Google
        </button>
      </div>

      <div style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:20px">
        By continuing you agree to our <a href="#" style="color:#5bc0eb">Terms</a> &amp; <a href="#"
          style="color:#5bc0eb">Privacy</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/api.js"></script>
  <script>
    requireGuest();

    // Initialize Supabase client for Google OAuth
    const SUPABASE_URL = 'https://jxzalgpvuamfmoysvkkz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4emFsZ3B2dWFtZm1veXN2a2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4Mzk2NTQsImV4cCI6MjA5MTQxNTY1NH0.MUETN8hl0l4S0gPJV9nlwSKQfJWcsntrmIb7No-vXN8';
    const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function switchTab(tab, btn) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(tab + '-form').classList.add('active');
    }

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Signing in...';
      const res = await AuthAPI.login({ email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value });
      if (res?.success) {
        setSession(res.token, res.refresh_token, res.user);
        Toast.success('Welcome back, ' + fmt.username(res.user.username) + '! <i class="fa-solid fa-chess-king"></i>');
        setTimeout(() => window.location.href = '/pages/dashboard.html', 700);
      } else {
        document.getElementById('login-err').textContent = res?.message || 'Login failed.';
        btn.disabled = false; btn.textContent = 'Login';
      }
    }

    async function doRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.disabled = true; btn.textContent = 'Creating...';

      // Normalize @username
      let rawUser = document.getElementById('r-user').value.trim().replace(/\s+/g, '');
      rawUser = rawUser.replace(/^@+/, '');
      rawUser = '@' + rawUser;

      if (!/^@[a-z0-9_]{4,20}$/.test(rawUser)) {
        document.getElementById('register-err').textContent = 'Username must be @username: 4-20 chars (a-z, 0-9, _), no spaces.';
        btn.disabled = false; btn.textContent = 'Create Account';
        return;
      }

      const res = await AuthAPI.register({
        username: rawUser,
        full_name: document.getElementById('r-name').value.trim(),
        email: document.getElementById('r-email').value.trim(),
        password: document.getElementById('r-pass').value,
        phone: document.getElementById('r-phone').value.trim(),
      });
      if (res?.success) {
        setSession(res.token, res.refresh_token, res.user);
        Toast.success('Account created! Welcome to PHOENIX X!');
        setTimeout(() => window.location.href = '/pages/dashboard.html', 700);
      } else {
        document.getElementById('register-err').textContent = res?.message || 'Registration failed.';
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    // ─── GOOGLE OAUTH ──────────────────────────────────────
    async function doGoogleLogin() {
      const btn = document.getElementById('google-btn');
      btn.disabled = true; btn.textContent = 'Connecting to Google...';

      try {
        const { data, error } = await sbClient.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/pages/login.html',
          },
        });
        if (error) {
          Toast.error(error.message || 'Google login failed.');
          btn.disabled = false; btn.innerHTML = svgGoogle() + ' Sign in with Google';
        }
        // Browser will redirect to Google — callback handled below
      } catch (err) {
        Toast.error('Failed to connect to Google.');
        btn.disabled = false; btn.innerHTML = svgGoogle() + ' Sign in with Google';
      }
    }

    function svgGoogle() {
      return '<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.08 24.08 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>';
    }

    // ─── HANDLE OAUTH CALLBACK ──────────────────────────────
    // After Google redirects back, Supabase puts tokens in the URL hash
    async function handleOAuthCallback() {
      const hash = window.location.hash;
      if (!hash || !hash.includes('access_token')) return;

      Toast.info('Completing sign-in...');

      try {
        // Supabase auto-picks up the hash tokens
        const { data: { session }, error } = await sbClient.auth.getSession();
        if (error || !session) {
          Toast.error('Sign-in failed. Please try again.');
          return;
        }

        // Send to our backend
        const res = await AuthAPI.oauthLogin({
          access_token: session.access_token,
          refresh_token: session.refresh_token,
        });

        if (res?.success) {
          setSession(res.token, res.refresh_token, res.user);
          Toast.success('Welcome, ' + fmt.username(res.user.username) + '! <i class="fa-solid fa-chess-king"></i>');
          // Clear the hash so it doesn't re-trigger
          history.replaceState(null, '', window.location.pathname);
          setTimeout(() => window.location.href = '/pages/dashboard.html', 700);
        } else {
          Toast.error(res?.message || 'Login failed.');
        }
      } catch (err) {
        console.error('OAuth callback error:', err);
        Toast.error('Sign-in error. Please try again.');
      }
    }

    // Run callback check on page load
    handleOAuthCallback();
  </script>
</body>

</html>
