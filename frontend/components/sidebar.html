<script>
  (function () {
    const user = (() => { try { return JSON.parse(localStorage.getItem('px_user')); } catch { return null; } })();
    if (user) {
      const u = document.getElementById('sb-username');
      const iq = document.getElementById('sb-iq');
      const av = document.getElementById('sb-avatar');
      const adminLnk = document.getElementById('sb-admin');
      if (u) u.textContent = fmt.username(user.username || 'Player');
      if (iq) iq.textContent = user.iq_level || 100;
      
      if (user.profile_image) {
        if (av) av.innerHTML = `<img src="${user.profile_image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      } else {
        if (av) av.textContent = (user.username || 'P').replace('@', '')[0].toUpperCase();
      }

      if (adminLnk && user.is_admin) adminLnk.style.display = '';
    }
    const cur = window.location.pathname.split('/').pop().replace('.html', '');
    document.querySelectorAll('.nav-item[data-page]').forEach(el => { if (el.dataset.page === cur) el.classList.add('active'); });
    const lb = document.getElementById('sb-logout');
    if (lb) lb.addEventListener('click', async (e) => {
      e.preventDefault();
      if (typeof AuthAPI !== 'undefined') { await AuthAPI.logout(); return; }
      try { await fetch('/api/auth/logout', { method: 'POST', headers: { Authorization: `Bearer ${localStorage.getItem('px_token')}` } }); } catch { }
      localStorage.removeItem('px_token'); localStorage.removeItem('px_refresh'); localStorage.removeItem('px_user');
      window.location.href = '/pages/login.html';
    });
    const tk = localStorage.getItem('px_token');
    if (tk) {
      fetch('/api/wallet/balance', { headers: { Authorization: `Bearer ${tk}` } })
        .then(r => r.json()).then(d => { const el = document.getElementById('sb-balance'); if (el && d.success) el.textContent = (d.wallet.balance || 0).toLocaleString(); }).catch(() => { });

      // Dynamically check the database for admin status so changes reflect without logging out
      fetch('/api/user/profile', { headers: { Authorization: `Bearer ${tk}` } })
        .then(r => r.json()).then(d => {
          if (d.success && d.user) {
            localStorage.setItem('px_user', JSON.stringify(d.user)); // Keep local session fresh
            const adminLnk = document.getElementById('sb-admin');
            if (adminLnk) {
              adminLnk.style.display = d.user.is_admin ? '' : 'none';
            }
          }
        }).catch(() => { });
    }
  })();
</script>
