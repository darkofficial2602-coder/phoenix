<script>
  // Centralized Sidebar Sync System
  window.updateSidebarUI = function (userData) {
    if (!userData) return;
    const elements = {
      name: document.getElementById('sb-username'),
      iq: document.getElementById('sb-iq'),
      avatar: document.getElementById('sb-avatar'),
      balance: document.getElementById('sb-balance'),
      admin: document.getElementById('sb-admin')
    };

    if (elements.name) elements.name.textContent = userData.full_name || userData.username || 'Player';
    if (elements.iq) elements.iq.textContent = userData.iq_level || 100;
    if (elements.balance && userData.coins !== undefined) {
      elements.balance.textContent = Number(userData.coins).toLocaleString();
    }

    if (userData.profile_image && elements.avatar) {
      elements.avatar.innerHTML = `<img src="${userData.profile_image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    } else if (elements.avatar) {
      elements.avatar.textContent = (userData.full_name || userData.username || 'P')[0].toUpperCase();
    }
    if (elements.admin) elements.admin.style.display = userData.is_admin ? '' : 'none';
  };

  (function initSidebar() {
    const tk = localStorage.getItem('px_token');
    if (!tk) return;
    const base = (typeof API_BASE !== 'undefined') ? API_BASE : '/api';

    // 1. Initial Render from Cache
    try {
      const cached = JSON.parse(localStorage.getItem('px_user'));
      if (cached) window.updateSidebarUI(cached);
    } catch (e) { }

    // 2. Active Sync Function
    const syncData = async () => {
      try {
        const [pRes, bRes] = await Promise.all([
          fetch(`${base}/user/profile`, { headers: { Authorization: `Bearer ${tk}` } }).then(r => r.json()),
          fetch(`${base}/wallet/balance`, { headers: { Authorization: `Bearer ${tk}` } }).then(r => r.json())
        ]);

        if (pRes.success && bRes.success) {
          const combined = { ...pRes.user, coins: bRes.wallet.balance };
          localStorage.setItem('px_user', JSON.stringify(combined));
          window.updateSidebarUI(combined);
        }
      } catch (err) {
        console.warn('Sidebar sync failed:', err);
      }
    };

    // 3. Execution
    syncData();
    setInterval(syncData, 15000); // Sync every 15s to keep it fresh but not heavy

    // 4. Page Active State
    const cur = window.location.pathname.split('/').pop().replace('.html', '') || 'dashboard';
    document.querySelectorAll('.nav-item[data-page]').forEach(el => {
      if (el.dataset.page === cur) el.classList.add('active');
    });

    // 5. Logout
    const lb = document.getElementById('sb-logout');
    if (lb) lb.onclick = (e) => {
      e.preventDefault();
      localStorage.clear();
      window.location.href = '/pages/login.html';
    };
  })();
</script>
